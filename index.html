<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ravina ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:linear-gradient(135deg,#ffdde1,#ee9ca7);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.container{
position:relative;
z-index:10;
width:90%;
max-width:420px;
background:rgba(255,255,255,.2);
backdrop-filter:blur(10px);
padding:30px 20px;
border-radius:25px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,.2);
}

h1{
font-size:34px;
color:#d8005f;
margin-bottom:15px;
font-weight:bold;
}

p{
font-size:20px;
font-weight:bold;
color:#fff;
line-height:1.6;
}

.buttons{
margin-top:35px;
position:relative;
height:120px;
}

button{
padding:15px 35px;
border:none;
border-radius:50px;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:.25s;
}

#yes{
background:#00c853;
color:white;
}

#yes:hover{
transform:scale(1.08);
}

#no{
background:#ff1744;
color:white;
position:absolute;
right:20px;
top:0;
}

#celebration{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff8ec7,#ffd3f2);
z-index:100;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

#celebration h2{
font-size:40px;
color:white;
font-weight:bold;
text-align:center;
text-shadow:2px 2px 8px black;
animation:pulse 1s infinite;
}

.gift{
font-size:90px;
margin-top:20px;
animation:dance .6s infinite alternate;
}

.confetti{
position:absolute;
font-size:28px;
animation:fall linear infinite;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:floatUp linear infinite;
opacity:.8;
}

@keyframes floatUp{
0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}
20%{opacity:1;}
100%{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}
}

@keyframes dance{
0%{transform:rotate(-15deg) translateY(0);}
100%{transform:rotate(15deg) translateY(-15px);}
}

@keyframes pulse{
50%{transform:scale(1.08);}
}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
}
100%{
transform:translateY(120vh) rotate(720deg);
}
}
</style>

</head>
<body>

<div class="container">
<h1>❤️ RAVINA ❤️</h1>

<p>
Every moment spent with you is the best for me.<br><br>
I am in love with you.<br><br>
Will you be mine?
</p>

<div class="buttons">
<button id="yes">YES</button>
<button id="no">NO</button>
</div>

</div>

<div id="celebration">
<h2>I KNEW YOU LOVE ME ❤️</h2>
<div class="gift">🎁</div>
</div>

<script>

// Floating hearts
for(let i=0;i<45;i++){

let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(5+Math.random()*6)+"s";
h.style.animationDelay=Math.random()*5+"s";
h.style.fontSize=(18+Math.random()*20)+"px";

document.body.appendChild(h);

}

// Move NO button
const no=document.getElementById("no");
const buttons=document.querySelector(".buttons");

function moveNo(){

const maxX=buttons.clientWidth-100;
const maxY=buttons.clientHeight-20;

const x=Math.random()*maxX;
const y=Math.random()*maxY;

no.style.left=x+"px";
no.style.top=y+"px";

}

// Desktop
no.addEventListener("mouseover",moveNo);

// Mobile
no.addEventListener("touchstart",(e)=>{
e.preventDefault();
moveNo();
});

// Extra safety
no.addEventListener("click",(e)=>{
e.preventDefault();
moveNo();
});

// YES
document.getElementById("yes").onclick=function(){

document.getElementById("celebration").style.display="flex";

// Confetti
const emojis=["🎉","🎊","💖","💝","✨","🌸","💗","💕","🎁","🥳"];

setInterval(()=>{

let c=document.createElement("div");

c.className="confetti";
c.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(2+Math.random()*3)+"s";
c.style.fontSize=(25+Math.random()*30)+"px";

document.getElementById("celebration").appendChild(c);

setTimeout(()=>c.remove(),5000);

},120);

};

</script>

</body>
</html>
